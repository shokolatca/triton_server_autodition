services:
  triton:
    build:
      context: .
      dockerfile: docker/Dockerfile.triton
    container_name: savos-triton
    shm_size: "1gb"
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=explicit
      --load-model=localizer
      --load-model=channel_selector
      --load-model=feature_extractor
      --load-model=ast_feature_extractor
      --load-model=classifier
      --load-model=classifier_furletov_ast
      --load-model=classifier_us8k_cnn
      --load-model=classifier_us8k_ast
      --load-model=pipeline
      --log-verbose=1
      --allow-metrics=true
    volumes:
      - ./model_repository:/models
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v2/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  gradio:
    build:
      context: .
      dockerfile: docker/Dockerfile.gradio
    container_name: savos-gradio
    depends_on:
      triton:
        condition: service_healthy
    environment:
      TRITON_URL: "triton:8001"
    ports:
      - "7860:7860"
    volumes:
      - ./demo:/app/demo
